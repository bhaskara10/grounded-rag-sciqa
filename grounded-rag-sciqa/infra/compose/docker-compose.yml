version: "3.9"

services:
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: sciqa-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - plugins.security.disabled=true
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
      - ../docker/opensearch/opensearch.yml:/usr/share/opensearch/config/opensearch.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '(green|yellow)'"]
      interval: 15s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: sciqa-postgres
    environment:
      POSTGRES_USER: sciqa
      POSTGRES_PASSWORD: sciqa
      POSTGRES_DB: sciqa
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sciqa"]
      interval: 10s
      timeout: 3s
      retries: 5

  ingest:
    build:
      context: ../..
      dockerfile: services/ingest/Dockerfile
    container_name: sciqa-ingest
    ports:
      - "8001:8001"
    env_file: ../../.env
    depends_on:
      postgres: { condition: service_healthy }
      opensearch: { condition: service_healthy }

  query:
    build:
      context: ../..
      dockerfile: services/query/Dockerfile
    container_name: sciqa-query
    ports:
      - "8002:8002"
    env_file: ../../.env
    depends_on:
      postgres: { condition: service_healthy }
      opensearch: { condition: service_healthy }

  eval:
    build:
      context: ../..
      dockerfile: services/eval/Dockerfile
    container_name: sciqa-eval
    ports:
      - "8003:8003"
    env_file: ../../.env
    depends_on:
      - ingest
      - query

volumes:
  opensearch-data:
  postgres-data:
